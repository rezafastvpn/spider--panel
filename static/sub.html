<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Spider Sub</title>
<style>
:root{--bg:#06060e;--bg2:#0d0d1a;--bg3:#14142a;--bg4:#1a1a30;--txt:#e0e0f0;--txt2:#7070a0;
  --neon:#ff1744;--g2:#00e676;--gold:#ffab00;--blue:#448aff;--purple:#7c4dff;
  --r:12px;--glow:0 0 30px rgba(255,23,68,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.container{max-width:520px;margin:0 auto;padding:16px;position:relative;z-index:1}
/* BG anim */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg .orb{position:absolute;border-radius:50%;filter:blur(120px);animation:fl 14s ease-in-out infinite}
.bg .orb:nth-child(1){width:350px;height:350px;background:var(--neon);top:-80px;right:-60px;opacity:.08}
.bg .orb:nth-child(2){width:250px;height:250px;background:var(--purple);bottom:-60px;left:-40px;opacity:.06;animation-delay:-7s}
@keyframes fl{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

/* Card */
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:var(--glow);position:relative;z-index:1}
.card::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.5}

/* Header */
.hdr{background:linear-gradient(135deg,rgba(255,23,68,.15),rgba(124,77,255,.1));padding:28px 20px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent)}
.hdr-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--neon),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;font-weight:800;color:#fff;box-shadow:0 0 20px rgba(255,23,68,.3)}
.hdr-name{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--neon),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:11px;color:var(--txt2);margin-top:4px;letter-spacing:2px}

/* Body */
.body{padding:20px}

/* Stats bar */
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;background:var(--bg3);border-radius:var(--r);padding:12px 8px;text-align:center;border:1px solid transparent;transition:all .3s}
.stat:hover{border-color:var(--neon)}
.stat-val{font-size:16px;font-weight:700;color:var(--neon)}
.stat-lbl{font-size:10px;color:var(--txt2);margin-top:4px}
.stat.good .stat-val{color:var(--g2)}
.stat.warn .stat-val{color:var(--gold)}
.stat.bad .stat-val{color:var(--neon)}

/* Progress bar */
.prog{margin-bottom:20px}
.prog-h{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.prog-h span{color:var(--txt2)}.prog-h strong{color:var(--neon)}
.prog-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:4px;transition:width .6s;background:linear-gradient(90deg,var(--g2),var(--neon));position:relative}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* Config box */
.cfg-box{background:var(--bg4);border:1px solid var(--bg3);border-radius:var(--r);padding:14px;position:relative;margin-bottom:12px;transition:all .2s}
.cfg-box:hover{border-color:var(--neon);box-shadow:0 0 16px rgba(255,23,68,.08)}
.cfg-label{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.cfg-link{font-family:'Courier New',monospace;font-size:11px;direction:ltr;text-align:left;word-break:break-all;color:var(--txt);line-height:1.8;max-height:120px;overflow-y:auto;background:rgba(0,0,0,.2);padding:10px;border-radius:6px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;text-decoration:none}
.btn-n{background:linear-gradient(135deg,var(--neon),#c2185b);color:#fff;flex:1}.btn-n:hover{filter:brightness(1.15);box-shadow:0 0 16px rgba(255,23,68,.3)}
.btn-g{background:var(--bg3);color:var(--txt)}.btn-g:hover{background:var(--bg4)}
.btn-b{background:rgba(68,138,255,.1);color:var(--blue)}.btn-b:hover{background:rgba(68,138,255,.2)}
.btn-p{background:rgba(124,77,255,.1);color:var(--purple)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

/* Ping */
.ping-sec{text-align:center;margin:16px 0}
.ping-btn{padding:14px 32px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.ping-btn:hover{filter:brightness(1.15);box-shadow:0 0 20px rgba(68,138,255,.3)}
.ping-btn:disabled{opacity:.5;cursor:not-allowed}
.ping-res{margin-top:10px;font-size:16px;font-weight:700}
.ping-res.fast{color:var(--g2)}.ping-res.mid{color:var(--gold)}.ping-res.slow{color:var(--neon)}

/* Apps */
.app-sec{margin-top:20px}
.app-title{font-size:12px;font-weight:700;color:var(--txt2);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:3px}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.app-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);cursor:pointer;transition:all .2s;text-decoration:none;color:var(--txt);border:1px solid transparent}
.app-card:hover{border-color:var(--neon);box-shadow:0 0 12px rgba(255,23,68,.1);transform:translateY(-1px)}
.app-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.app-ic.ios{background:rgba(68,138,255,.15);color:var(--blue)}
.app-ic.and{background:rgba(0,230,118,.15);color:var(--g2)}
.app-ic.win{background:rgba(68,138,255,.15);color:var(--blue)}
.app-ic.cls{background:rgba(255,171,0,.15);color:var(--gold)}
.app-info{flex:1}.app-nm{font-size:12px;font-weight:600}.app-os{font-size:10px;color:var(--txt2)}

/* OS labels */
.os-label{font-size:10px;font-weight:700;color:var(--txt2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:2px;padding:4px 8px;background:var(--bg3);border-radius:4px;display:inline-block}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--neon);color:var(--txt);padding:10px 24px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1}

/* Loading */
.loading{text-align:center;padding:60px 20px}
.spin{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.error{text-align:center;padding:40px}.error h3{color:var(--neon);margin-bottom:8px}.error p{color:var(--txt2);font-size:13px}

/* Footer */
.foot{text-align:center;padding:16px;font-size:10px;color:var(--txt2)}.foot a{color:var(--neon);text-decoration:none}
</style>
</head>
<body>
<div class="bg"><div class="orb"></div><div class="orb"></div></div>
<div class="container" id="app">
  <div class="loading"><div class="spin"></div><p style="color:var(--txt2);font-size:13px">در حال بارگذاری...</p></div>
</div>
<div class="toast" id="toast"></div>
<div class="foot">Powered by <a href="/spider">Spider Panel</a></div>

<script>
var uname=window.location.pathname.split('/').pop();
document.title='Spider | '+uname;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

function fm(b){if(!b||b<1)return'0 B';var u=['B','KB','MB','GB'];var i=0;while(b>=1024&&i<u.length-1){b/=1024;i++}return b.toFixed(i?2:0)+' '+u[i]}
function fp(u,t){return t&&t>0?Math.min(100,(u/t*100)):0}

var _cfg='',_subUrl='',_host='';

async function load(){
  try{
    var r=await fetch('/api/sub/'+uname);
    if(!r.ok) throw new Error(r.status===404?'کاربر یافت نشد':'خطای سرور');
    var d=await r.json();
    _cfg=d.config||d.vless_link||'';
    _host=window.location.origin;
    _subUrl=_host+'/sub-sync/sub/'+uname;
    render(d);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="error"><h3>'+uname+'</h3><p>'+e.message+'</p><p style="margin-top:12px;font-size:11px">ابتدا در پنل Spider کاربر را بسازید</p></div>';
  }
}

function render(d){
  var used=d.traffic_used_bytes||0,limit=d.traffic_limit_bytes||0,pct=fp(used,limit);
  var days=d.expire_days,daysCls=days===null?'good':days>7?'good':days>2?'warn':'bad',daysTxt=days===null?'نامحدود':days+' روز';
  var name=d.username||uname,init=name.charAt(0).toUpperCase(),proto=(d.protocol||'vless').toUpperCase();
  var h='';

  h+='<div class="card">';
  // Header
  h+='<div class="hdr"><div class="hdr-av">'+init+'</div><div class="hdr-name">'+name+'</div><div class="hdr-sub">'+proto+' SUBSCRIPTION</div></div>';
  h+='<div class="body">';

  // Stats
  h+='<div class="stats"><div class="stat"><div class="stat-val">'+fm(used)+'</div><div class="stat-lbl">مصرف</div></div><div class="stat"><div class="stat-val">'+(limit>0?fm(limit):'&infin;')+'</div><div class="stat-lbl">حجم کل</div></div><div class="stat '+daysCls+'"><div class="stat-val">'+daysTxt+'</div><div class="stat-lbl">روز باقی</div></div></div>';

  // Progress
  h+='<div class="prog"><div class="prog-h"><span>مصرف '+pct.toFixed(1)+'%</span><strong>'+fm(used)+' / '+(limit>0?fm(limit):'&infin;')+'</strong></div><div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';

  // Config box
  if(_cfg){
    h+='<div class="cfg-box"><div class="cfg-label">LINK</div><div class="cfg-link">'+_cfg+'</div><button class="btn btn-n" onclick="copyCfg()" style="width:100%;margin-top:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> کپی کانفیگ</button></div>';
  }

  // Button row
  h+='<div class="btn-row">';
  h+='<button class="btn btn-b" onclick="copySub()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> کپی لینک ساب</button>';
  h+='<button class="btn btn-p" onclick="window.open(\'v2rayng://install-sub?url=\'+encodeURIComponent(_subUrl),\'_blank\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Import</button>';
  h+='</div>';

  // Ping
  h+='<div class="ping-sec"><button class="ping-btn" id="ping-btn" onclick="doPing()">PING CONFIG</button><div class="ping-res" id="ping-res"></div></div>';

  // Apps
  h+='<div class="app-sec"><div class="app-title">Quick Import</div>';

  // iOS
  h+='<div class="os-label">iOS</div><div class="app-grid">';
  h+=appCard('V2Box','iOS','ios','https://apps.apple.com/app/v2box-v2ray-client/id6446814690');
  h+=appCard('Hiddify','iOS','ios','https://apps.apple.com/app/hiddify-proxy-vpn/id6596777532');
  h+='</div>';

  // Android
  h+='<div class="os-label">Android</div><div class="app-grid">';
  h+=appCard('v2rayNG','Android','and','https://github.com/2dust/v2rayNG/releases');
  h+=appCard('Clash Meta','Android','cls','https://github.com/MetaCubeX/ClashMetaForAndroid/releases');
  h+=appCard('Sing-box','Android','and','https://github.com/SagerNet/sing-box/releases');
  h+=appCard('Hiddify','Android','and','https://github.com/hiddify/hiddify-next/releases');
  h+='</div>';

  // Windows
  h+='<div class="os-label">Windows</div><div class="app-grid">';
  h+=appCard('v2rayN','Windows','win','https://github.com/2dust/v2rayN/releases');
  h+=appCard('Clash Verge','Windows','cls','https://github.com/clash-verge-rev/clash-verge-rev/releases');
  h+='</div></div>';

  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
}

function appCard(nm,os,cls,url){
  return '<a class="app-card" href="'+url+'" target="_blank"><div class="app-ic '+cls+'">'+nm.charAt(0)+'</div><div class="app-info"><div class="app-nm">'+nm+'</div><div class="app-os">'+os+'</div></div></a>';
}

function copyCfg(){
  if(!_cfg) return;
  navigator.clipboard.writeText(_cfg).then(function(){toast('کانفیگ کپی شد')}).catch(function(){toast('خطا')});
}
function copySub(){
  navigator.clipboard.writeText(_subUrl).then(function(){toast('لینک ساب کپی شد')}).catch(function(){toast('خطا')});
}

async function doPing(){
  var btn=document.getElementById('ping-btn'),res=document.getElementById('ping-res');
  btn.disabled=true;btn.textContent='PINGING...';res.textContent='';
  var t0=Date.now();
  try{
    var r=await fetch(_subUrl,{method:'HEAD',cache:'no-store'});
    var ms=Date.now()-t0,cls=ms<150?'fast':ms<400?'mid':'slow',icon=ms<150?'GOOD':ms<400?'OK':'SLOW';
    res.textContent=icon+' '+ms+'ms';res.className='ping-res '+cls;
  }catch(e){
    res.textContent='TIMEOUT '+ (Date.now()-t0) +'ms';res.className='ping-res slow';
  }
  btn.disabled=false;btn.textContent='PING CONFIG';
}

load();
</script>
</body>
</html>
